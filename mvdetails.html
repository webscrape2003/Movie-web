<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vegamovies Premium - Player</title>

<style>
:root {
    --bg-body:#0a0a0a;
    --bg-content:#161616;
    --accent-blue:#007bff;
    --text-white:#fff;
}

body{
    background:var(--bg-body);
    color:#fff;
    font-family:Segoe UI;
    margin:0;
}

/* HEADER */
.top-nav{
    background:#000;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

/* LOADING */
#loading{
    display:none;
    text-align:center;
    padding:20px;
    color:#2ecc71;
}

/* MAIN */
.wrapper{
    max-width:1200px;
    margin:20px auto;
    display:grid;
    grid-template-columns:1fr 300px;
    gap:20px;
}

/* PLAYER */
.player-box{
    width:100%;
    background:#000;
    aspect-ratio:16/9;
    position:relative;
}

#moviePlayer{width:100%;height:100%;}

.overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background-size:cover;
}

.p-btn{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#2ecc71;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
}

/* DETAILS */
.meta{
    display:flex;
    gap:20px;
    padding:20px;
}

.poster{
    width:200px;
}

.info p{margin:8px 0}

/* DOWNLOAD */
.btn{
    display:block;
    background:#007bff;
    padding:12px;
    margin:10px;
    text-align:center;
    color:#fff;
    text-decoration:none;
}

/* SIDEBAR */
.side-card{
    display:flex;
    margin:10px;
    cursor:pointer;
}
.side-card img{width:70px}
</style>
</head>

<body>

<div class="top-nav">🎬 VEGAMOVIES PLAYER</div>

<div id="loading">Loading movie...</div>

<div class="wrapper" id="mainUI" style="display:none;">

<!-- MAIN -->
<div>
<h2 id="mTitle"></h2>

<div class="player-box">
<div id="pOverlay" class="overlay">
<div class="p-btn" onclick="startPlay()">▶</div>
</div>

<video id="moviePlayer" controls>
<source id="vSrc">
</video>
</div>

<div class="meta">
<img id="mImg" class="poster">
<div class="info">
<p><b>Title:</b> <span id="mOrig"></span></p>
<p><b>Date:</b> <span id="mDate"></span></p>
<p><b>Duration:</b> <span id="mDur"></span></p>
<p><b>Country:</b> <span id="mCtry"></span></p>
</div>
</div>

<div id="dlLinks"></div>

<p id="mDesc" style="padding:20px;"></p>

</div>

<!-- SIDEBAR -->
<div id="popList"></div>

</div>

<script>
const KEY = "vajira-4h3jzwtl78-1775239300004";

/* GET URL PARAM */
function getParam(name){
    const url = new URLSearchParams(window.location.search);
    return url.get(name);
}

/* AUTO LOAD */
window.onload = () => {
    let link = getParam("link");
    const title = getParam("title");
    const image = getParam("image");

    if(title) document.getElementById("mTitle").innerText = title;
    if(image) document.getElementById("mImg").src = image;

    if(link){
        fetchFullAPI(link);
    }else{
        alert("No movie selected!");
    }
};

/* FETCH API */
async function fetchFullAPI(link){
    document.getElementById('loading').style.display='block';

    // 🔥 FIX LINK (IMPORTANT)
    if (!link.startsWith("http")) {
        link = "https://vegaduo.com/" + link;
    }

    const api = `https://vajira-official-apis.vercel.app/api/vegamoviedl?apikey=${KEY}&link=${encodeURIComponent(link)}`;

    try{
        const res = await fetch(api);
        const data = await res.json();

        // 🔒 SAFE CHECK
        if (!data || !data.result) {
            throw new Error("Invalid API response");
        }

        const m = data.result;

        document.getElementById('mainUI').style.display='grid';
        document.getElementById('loading').style.display='none';

        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mImg').src = m.image;
        document.getElementById('mOrig').innerText = m.originalTitle;
        document.getElementById('mDate').innerText = m.date;
        document.getElementById('mDur').innerText = m.duration;
        document.getElementById('mCtry').innerText = m.country;
        document.getElementById('mDesc').innerText = m.description;

        const vid = document.getElementById('moviePlayer');
        const overlay = document.getElementById('pOverlay');

        overlay.style.backgroundImage = `url('${m.image}')`;

        if(m.downloads && m.downloads.length > 0){
            document.getElementById('vSrc').src = m.downloads[0].url;
            vid.load();
        }

        // DOWNLOAD LINKS
        const dl = document.getElementById('dlLinks');
        dl.innerHTML = '';

        m.downloads.forEach(d=>{
            dl.innerHTML += `<a href="${d.url}" target="_blank" class="btn">${d.buttonLabel}</a>`;
        });

        // SIDEBAR
        const side = document.getElementById('popList');
        side.innerHTML = '';

        m.popularTVSeries.forEach(tv=>{
            const div = document.createElement('div');
            div.className='side-card';
            div.onclick=()=>fetchFullAPI(tv.url);

            div.innerHTML=`
            <img src="${tv.image}">
            <div>
            <div>${tv.title}</div>
            <small>${tv.releaseYear}</small>
            </div>`;

            side.appendChild(div);
        });

    }catch(e){
        console.error(e);
        alert("API error or invalid link ❌");
        document.getElementById('loading').style.display='none';
    }
}

/* PLAY */
function startPlay(){
    document.getElementById('pOverlay').style.display='none';
    document.getElementById('moviePlayer').play();
}
</script>

</body>
</html>
