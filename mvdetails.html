<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Details</title>

<style>

/* GLOBAL RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
html{scroll-behavior:smooth;}
body{background:#121212;color:#eee;line-height:1.6;}

/* CONTAINER */
.container{max-width:1200px;margin:auto;padding:15px;}

/* HEADER */
.header{display:flex;gap:20px;margin-top:20px;}
.header img{width:300px;border-radius:8px;}

/* MOVIE INFO */
.info{flex:1;}
.info h1{
    font-size:2.5rem;
    margin-bottom:10px;
    color:#fff;
}
.info .meta{font-size:0.9rem;color:#aaa;margin-bottom:15px;}
.info .meta span{margin-right:15px;}

.desc{
    margin:15px 0 30px 0;
    color:#ccc;
}

/* BUTTONS */
.btn{
    display:inline-block;
    background:#e50914;
    color:#fff;
    text-transform:uppercase;
    font-weight:bold;
    padding:12px 22px;
    border-radius:5px;
    margin-right:10px;
    font-size:0.9rem;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover{background:#ff1a2c;}

/* VIDEO */
.video-container{
    margin-top:30px;
    background:#000;
    border-radius:8px;
    overflow:hidden;
}
.video-container video{
    width:100%;
    height:100%;
}

/* SECTIONS */
.section-title{
    font-size:1.5rem;
    margin:30px 0 15px;
    border-bottom:2px solid #444;
    padding-bottom:5px;
    color:#fff;
}

/* CARD LISTS */
.list-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.card{
    background:#1e1e1e;
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}
.card:hover{
    transform:translateY(-5px);
}
.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}
.card-title{
    padding:8px;
    font-size:0.9rem;
    color:#fff;
}

/* DOWNLOAD LINKS */
.download-list .btn-download{
    display:block;
    background:#0288d1;
    margin:8px 0;
    text-align:center;
}
.download-list .btn-download:hover{
    background:#03a9f4;
}

/* RESPONSIVE */
@media(max-width:768px){
    .header{flex-direction:column;align-items:center;}
    .header img{width:80%;}
}
</style>

</head>
<body>

<div class="container">

    <!-- MOVIE HEADER -->
    <div class="header">
        <img id="moviePoster" src="" alt="Poster">
        <div class="info">
            <h1 id="movieTitle">Loading...</h1>
            <div class="meta">
                <span id="movieYear"></span>
                <span id="movieCountry"></span>
                <span id="movieDuration"></span>
            </div>
            <div class="desc" id="movieDesc"></div>
            <div id="genreButtons"></div>
        </div>
    </div>

    <!-- VIDEO PLAYER -->
    <div class="video-container" id="videoPlayerWrap" style="display:none;">
        <video controls id="videoPlayer">
            <source id="videoSrc" src="">
        </video>
    </div>

    <!-- DOWNLOAD LINKS -->
    <div class="section-title">Download Links</div>
    <div class="download-list" id="downloadLinks"></div>

    <!-- SIMILAR MOVIES -->
    <div class="section-title">Similar Movies</div>
    <div class="list-grid" id="similarMovies"></div>

    <!-- POPULAR TV SERIES -->
    <div class="section-title">Popular TV Series</div>
    <div class="list-grid" id="popularSeries"></div>

</div>

<script>

// ===== API CONFIG =====
const API_KEY = "vajira-1rtwuqyc48-1774786581090";

function getQueryParam(param) {
    return new URLSearchParams(window.location.search).get(param);
}

async function loadMovieDetails() {
    let link = getQueryParam("link");
    if (!link) {
        alert("No movie selected!");
        return;
    }

    if (!link.startsWith("http")) {
        link = "https://vegaduo.com/" + link;
    }

    const url = 
`https://vajira-official-apis.vercel.app/api/vegamoviedl?apikey=${API_KEY}&link=${encodeURIComponent(link)}`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data || !data.result) throw new Error("Invalid API");

        const m = data.result;

        document.getElementById("movieTitle").innerText = m.title;
        document.getElementById("moviePoster").src = m.image;
        document.getElementById("movieYear").innerText = m.date;
        document.getElementById("movieCountry").innerText = m.country;
        document.getElementById("movieDuration").innerText = m.duration;
        document.getElementById("movieDesc").innerText = m.description;

        // genres
        const genresDiv = document.getElementById("genreButtons");
        genresDiv.innerHTML = "";
        m.genres.forEach(g => {
            genresDiv.innerHTML += `<span class="btn" onclick="location.href='${g.url}'">${g.genreName}</span>`;
        });

        // video (if downloads exist)
        if (m.downloads && m.downloads.length > 0) {
            document.getElementById("videoPlayerWrap").style.display = "block";
            document.getElementById("videoSrc").src = m.downloads[0].url;
            document.getElementById("videoPlayer").load();
        }

        // downloads
        const dlDiv = document.getElementById("downloadLinks");
        dlDiv.innerHTML = "";
        m.downloads.forEach(d => {
            dlDiv.innerHTML += `
                <a class="btn btn-download" href="${d.url}" target="_blank">
                    ${d.buttonLabel}
                </a>`;
        });

        // similar
        const simDiv = document.getElementById("similarMovies");
        simDiv.innerHTML = "";
        m.similarTitles.forEach(s => {
            simDiv.innerHTML += `
            <div class="card" onclick="location.href='mvdetails.html?link=${encodeURIComponent(s.url)}'">
                <img src="${s.image}">
                <div class="card-title">${s.title}</div>
            </div>`;
        });

        // popular tv
        const popDiv = document.getElementById("popularSeries");
        popDiv.innerHTML = "";
        m.popularTVSeries.forEach(p => {
            popDiv.innerHTML += `
            <div class="card" onclick="location.href='mvdetails.html?link=${encodeURIComponent(p.url)}'">
                <img src="${p.image}">
                <div class="card-title">${p.title} • ${p.releaseYear}</div>
            </div>`;
        });

    } catch (err) {
        console.error(err);
        alert("Failed to load movie details.");
    }
}

window.onload = loadMovieDetails;

</script>

</body>
</html>
