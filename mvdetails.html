<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Details - Vegamovies</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f;
  --card:#1a1a1a;
  --text:#fff;
  --primary:#0d6efd;
  --accent:#ffc107;
  --dim:#6c757d;
}
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Roboto',sans-serif;
  margin:0;padding:0;
}
a {text-decoration:none;color:var(--primary);}
.container {max-width:1200px;margin:auto;padding:20px;}
.header {text-align:center;margin:20px 0;}
.header h1 {font-size:2rem;margin:0;}
.header p {color:var(--dim);font-size:0.9rem;}
.main-grid {display:grid;grid-template-columns:2fr 1fr;gap:20px;}
.section-title {font-weight:700;margin:20px 0 10px;border-bottom:1px solid var(--dim);padding-bottom:5px;font-size:1.2rem;}
.video-box {position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:10px;overflow:hidden;}
.video-box video {position:absolute;top:0;left:0;width:100%;height:100%;}
.movie-card {background:var(--card);border-radius:10px;padding:15px;}
.movie-card img {width:100%;border-radius:10px;margin-bottom:15px;}
.meta-info p {margin:6px 0;font-size:0.95rem;}
.genre-list a, .download-list a {
  background:var(--primary);padding:8px 10px;border-radius:5px;font-size:0.85rem;color:#fff;margin:4px;
}
.download-list a {background:var(--accent);color:#000;}
.similar-list, .popular-list {
  display:flex;flex-wrap:wrap;gap:10px;
}
.similar-card, .popular-card {
  background:var(--card);width:140px;border-radius:8px;overflow:hidden;cursor:pointer;transition:0.3s;
}
.similar-card:hover, .popular-card:hover {transform:scale(1.05);}
.similar-card img, .popular-card img {width:100%;height:200px;object-fit:cover;}
.similar-card div, .popular-card div {padding:6px;font-size:0.85rem;color:#fff;}
@media(max-width:900px) {
  .main-grid {grid-template-columns:1fr;}
  .similar-card, .popular-card {width:120px;}
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1 id="title">Loading...</h1>
    <p id="subinfo"></p>
  </div>

  <div class="main-grid">

    <!-- LEFT SIDE -->
    <div>

      <!-- VIDEO -->
      <div class="video-box">
        <video controls id="moviePlayer">
          <source id="videoSrc">
        </video>
      </div>

      <!-- INFO BOX -->
      <div class="movie-card">
        <img id="poster" src="" alt="Poster">

        <div class="meta-info">
          <p><strong>Original Title:</strong> <span id="origTitle"></span></p>
          <p><strong>Release:</strong> <span id="releaseDate"></span></p>
          <p><strong>Country:</strong> <span id="country"></span></p>
          <p><strong>Duration:</strong> <span id="duration"></span></p>
          <p><strong>Genres:</strong></p>
          <div class="genre-list" id="genres"></div>
          <p><strong>Description:</strong></p>
          <p id="description"></p>

          <p class="section-title">Download Links</p>
          <div class="download-list" id="downloads"></div>
        </div>
      </div>

      <p class="section-title">Similar Movies</p>
      <div class="similar-list" id="similarMovies"></div>

    </div>

    <!-- RIGHT SIDE: POPULAR -->
    <div>
      <p class="section-title">Popular TV Series</p>
      <div class="popular-list" id="popularList"></div>
    </div>

  </div>
</div>

<script>

// 📌 API KEY
const API_KEY = "vajira-1rtwuqyc48-1774786581090";

// ➤ GET URL PARAM
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

// ➤ LOAD MOVIE DATA
async function loadMovie() {
  const linkParam = getParam("link");
  if (!linkParam) {
    alert("No movie selected!");
    return;
  }

  // ensure full link
  const link = linkParam.startsWith("http")
    ? linkParam
    : "https://vegaduo.com/" + linkParam;

  const url = `https://vajira-official-apis.vercel.app/api/vegamoviedl?apikey=${API_KEY}&link=${encodeURIComponent(link)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!data || !data.result) {
      throw new Error("Invalid API response");
    }

    const m = data.result;

    document.getElementById("title").innerText = m.title;
    document.getElementById("subinfo").innerText = `${m.date} • ${m.country} • ${m.duration}`;

    document.getElementById("poster").src = m.image;
    document.getElementById("origTitle").innerText = m.originalTitle;
    document.getElementById("releaseDate").innerText = m.date;
    document.getElementById("country").innerText = m.country;
    document.getElementById("duration").innerText = m.duration;
    document.getElementById("description").innerText = m.description;

    // video source (if available)
    if (m.downloads && m.downloads.length) {
      document.getElementById("videoSrc").src = m.downloads[0].url;
      document.getElementById("moviePlayer").load();
    }

    // genres
    const genresDiv = document.getElementById("genres");
    genresDiv.innerHTML = "";
    m.genres.forEach(g => {
      genresDiv.innerHTML += `<a href="${g.url}">${g.genreName}</a>`;
    });

    // downloads
    const dlDiv = document.getElementById("downloads");
    dlDiv.innerHTML = "";
    m.downloads.forEach(dl => {
      dlDiv.innerHTML += `<a href="${dl.url}" target="_blank">${dl.buttonLabel}</a>`;
    });

    // similar
    const simDiv = document.getElementById("similarMovies");
    simDiv.innerHTML = "";
    m.similarTitles.forEach(s => {
      simDiv.innerHTML += `
        <div class="similar-card" onclick="location.href='?link=${encodeURIComponent(s.url)}'">
          <img src="${s.image}">
          <div>${s.title}</div>
        </div>
      `;
    });

    // popular
    const popDiv = document.getElementById("popularList");
    popDiv.innerHTML = "";
    m.popularTVSeries.forEach(p => {
      popDiv.innerHTML += `
        <div class="popular-card" onclick="location.href='?link=${encodeURIComponent(p.url)}'">
          <img src="${p.image}">
          <div>${p.title} <br><small>${p.releaseYear} • ⭐${p.rating}</small></div>
        </div>
      `;
    });

  } catch (e) {
    console.error(e);
    alert("Failed to load movie data.");
  }
}

// load when page opens
window.onload = loadMovie;

</script>
</body>
</html>
