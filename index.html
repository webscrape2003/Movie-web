<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vajira Movie Box - 2026 Edition</title>
    <style>
        /* VEGAMOVIES STYLE CSS */
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent-green: #4CAF50;
            --text-white: #ffffff;
            --text-grey: #b0b0b0;
            --search-bg: #2a2a2a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar & Header */
        header {
            background: #000;
            padding: 20px 0;
            border-bottom: 2px solid var(--accent-green);
            text-align: center;
        }

        .logo { font-size: 28px; font-weight: 800; color: var(--text-white); text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: var(--accent-green); }

        /* Search Section - Same as Image */
        .hero-search {
            background: #181818;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .search-box {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            display: flex;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            background: var(--search-bg);
            border: 1px solid #444;
            border-radius: 4px 0 0 4px;
            color: white;
            font-size: 16px;
        }

        .search-box button {
            background: var(--accent-green);
            border: none;
            padding: 0 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            transition: 0.3s;
        }

        .search-box button:hover { background: #3e8e41; }

        /* Section Title */
        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }
        .section-header {
            border-left: 4px solid var(--accent-green);
            padding-left: 15px;
            margin: 30px 0;
            font-size: 20px;
            font-weight: bold;
        }

        /* Movie Grid */
        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .movie-card:hover { transform: scale(1.03); }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent-green);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .movie-details { padding: 10px; }
        .movie-title {
            font-size: 14px;
            margin: 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }
        .movie-meta { font-size: 12px; color: var(--text-grey); }

        .loading-text { text-align: center; padding: 50px; font-style: italic; color: var(--accent-green); }
    </style>
</head>
<body>

<header>
    <div class="logo">VEGA<span>MOVIES</span></div>
</header>

<div class="hero-search">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Movie Name (e.g. Harry Potter)...">
        <button onclick="handleSearch()">SEARCH</button>
    </div>
</div>

<div class="container">
    <div class="section-header" id="dynamic-title">Latest Movies (2026)</div>
    <div id="movie-grid">
        </div>
</div>

<script>
    const API_BASE = "https://vajira-official-apis.vercel.app/api/vegamovies";
    const API_KEY = "vajira-4h3jzwtl78-1775239300004";
    const grid = document.getElementById('movie-grid');
    const title = document.getElementById('dynamic-title');

    // 1. Function to Fetch Data
    async function fetchMovies(query) {
        grid.innerHTML = '<div class="loading-text">Fetching movies... Please wait...</div>';
        
        try {
            const response = await fetch(`${API_BASE}?apikey=${API_KEY}&text=${query}`);
            const data = await response.json();

            if (data.status === 200 && data.result && data.result.length > 0) {
                renderMovies(data.result);
            } else {
                grid.innerHTML = '<div class="loading-text">No results found for "' + query + '".</div>';
            }
        } catch (error) {
            grid.innerHTML = '<div class="loading-text">Error connecting to API.</div>';
        }
    }

    // 2. Function to Render HTML Cards
    function renderMovies(movies) {
        grid.innerHTML = '';
        movies.forEach(movie => {
            const card = `
                <div class="movie-card" onclick="window.open('${movie.link}', '_blank')">
                    <span class="badge">${movie.quality}</span>
                    <img class="movie-poster" src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Poster'">
                    <div class="movie-details">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">${movie.year} • ${movie.quality}</div>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    // 3. Search Logic
    function handleSearch() {
        const query = document.getElementById('searchInput').value;
        if (query.trim() !== "") {
            title.innerText = `Search Results for: ${query}`;
            fetchMovies(query);
        }
    }

    // 4. Default View (2026) on page load
    window.onload = () => {
        fetchMovies('2026');
    };

    // Allow search by pressing "Enter"
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
</script>

</body>
</html>
