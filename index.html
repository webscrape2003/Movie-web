<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - Latest Movies & TV Series</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent-color: #2ecc71; /* Green labels */
            --text-main: #ffffff;
            --text-dim: #bbbbbb;
            --header-bg: #111111;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* Header Styling */
        header {
            background-color: var(--header-bg);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
        }

        h2 {
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        /* Movie Grid */
        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        /* Movie Card */
        .movie-card {
            background: var(--card-bg);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-5px);
        }

        .movie-card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            display: block;
        }

        /* Badge/Label style */
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent-color);
            color: black;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .movie-info {
            padding: 10px;
            text-align: center;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Loading Spinner */
        #loader {
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }

        @media (max-width: 600px) {
            #movie-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">VEGA<span>CLONE</span></div>
    </header>

    <div class="container">
        <h2>Featured Movies</h2>
        <div id="loader">Loading movies...</div>
        <div id="movie-grid"></div>
    </div>

    <script>
        // API URL from your request
        const apiURL = "https://vajira-official-apis.vercel.app/api/vegamovies?apikey=vajira-4h3jzwtl78-1775239300004&text=2026";

        async function fetchMovies() {
            try {
                const response = await fetch(apiURL);
                const data = await response.json();
                
                if (data.status === 200) {
                    displayMovies(data.result);
                } else {
                    document.getElementById('loader').innerText = "Failed to load movies.";
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loader').innerText = "Error connecting to API.";
            }
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            const loader = document.getElementById('loader');
            
            // Hide loader
            loader.style.display = 'none';

            movies.forEach(movie => {
                // Create card element
                const card = document.createElement('div');
                card.className = 'movie-card';

                // We handle the year display (cleaning up the date string if necessary)
                const releaseYear = movie.year.split('-').length > 1 ? movie.year.split('-')[2].substring(0,4) : movie.year;

                card.innerHTML = `
                    <span class="badge">${movie.quality !== "N/A" ? movie.quality : 'Featured'}</span>
                    <img src="${movie.image}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/180x270?text=No+Image'">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">${releaseYear} • ⭐ ${movie.rating}</div>
                    </div>
                `;

                // Link to movie page (using the link from API)
                card.onclick = () => window.open(`https://vegaduo.com/${movie.link}`, '_blank');

                grid.appendChild(card);
            });
        }

        // Run the fetch on load
        fetchMovies();
    </script>
</body>
</html>
