<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEGAMOVIES | 2026 Official</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #151515;
            --accent: #4CAF50;
            --text: #ffffff;
            --sub-text: #888;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: #000;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .logo { font-size: 32px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .search-bar {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            background: #222;
            padding: 5px;
            border-radius: 5px;
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        .search-bar button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 25px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .section-title {
            font-size: 20px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
        }

        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .poster-container { position: relative; width: 100%; aspect-ratio: 2/3; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; }

        .quality-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent);
            font-size: 11px;
            padding: 2px 8px;
            font-weight: bold;
            border-radius: 3px;
        }

        .rating-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #ffc107;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid #ffc107;
        }

        .info { padding: 12px; }
        .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .meta { font-size: 12px; color: var(--sub-text); }
    </style>
</head>
<body>

<header>
    <div class="logo">VEGA<span>MOVIES</span></div>
    <div class="search-bar">
        <input type="text" id="movieSearch" placeholder="Search 2026 or movie name...">
        <button onclick="performSearch()">SEARCH</button>
    </div>
</header>

<div class="container">
    <div class="section-title" id="gridLabel">Loading...</div>
    <div id="movie-grid"></div>
</div>

<script>
    const API_KEY = "vajira-4h3jzwtl78-1775239300004";
    const API_URL = "https://vajira-official-apis.vercel.app/api/vegamovies";

    async function performSearch() {
        const query = document.getElementById('movieSearch').value || "2026";
        const grid = document.getElementById('movie-grid');
        const label = document.getElementById('gridLabel');

        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">Fetching Latest Content...</div>';
        label.innerText = `Showing results for: ${query}`;

        try {
            // We fetch with the search text. 
            const response = await fetch(`${API_URL}?apikey=${API_KEY}&text=${query}`);
            const data = await response.json();

            if (data.result && data.result.length > 0) {
                grid.innerHTML = "";
                
                data.result.forEach(movie => {
                    // Logic to clean up the Year display (handles both "2025" and "03-04-2026, 09:30")
                    let displayYear = movie.year;
                    if(movie.year.includes('-')) {
                        // Extracts the year from the date string "03-04-2026"
                        const dateParts = movie.year.split(',')[0].split('-');
                        displayYear = dateParts[2] || dateParts[0]; 
                    }

                    const displayQuality = (movie.quality === "N/A" || !movie.quality) ? "FEATURED" : movie.quality;
                    
                    const card = `
                        <div class="movie-card" onclick="window.open('https://vegaduo.com/${movie.link}', '_blank')">
                            <div class="poster-container">
                                <span class="quality-tag">${displayQuality}</span>
                                <span class="rating-tag">★ ${movie.rating || '0'}</span>
                                <img src="${movie.image}" alt="${movie.title}" class="movie-poster" onerror="this.src='https://via.placeholder.com/200x300?text=No+Poster'">
                            </div>
                            <div class="info">
                                <div class="title">${movie.title}</div>
                                <div class="meta">
                                    <span>Year: ${displayYear}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } else {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">No movies found for this search.</div>';
            }
        } catch (error) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: red;">API Connection Error.</div>';
        }
    }

    // Default Load on Start
    window.onload = () => {
        document.getElementById('movieSearch').value = "2026";
        performSearch();
    };

    // Enter Key Support
    document.getElementById('movieSearch').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });
</script>

</body>
</html>
