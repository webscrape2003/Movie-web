<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegamovies - Download Hub</title>
    <style>
        /* VEGAMOVIES EXACT COLOR PALETTE */
        :root {
            --bg-body: #1c1c1c;
            --bg-content: #222222;
            --header-gray: #333333;
            --text-gold: #f39c12;
            --btn-blue: #007bff;
            --btn-blue-hover: #0056b3;
            --text-white: #ffffff;
            --text-muted: #aaaaaa;
            --res-label: #ff4d4d;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-white);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0;
        }

        /* TOP NAVIGATION */
        .header-nav {
            background: #000;
            padding: 12px 5%;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #444;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--text-gold); }
        .nav-links { margin-left: 40px; display: flex; gap: 20px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .nav-links div:hover { color: var(--text-gold); }

        /* SEARCH INPUT AREA */
        .search-bar-container {
            background: #282828;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        #movieUrl {
            width: 50%;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 3px;
        }
        #fetchBtn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }

        /* MAIN LAYOUT */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 15px;
            padding: 0 10px;
        }

        .main-content { background: var(--bg-content); border-radius: 2px; }
        
        .breadcrumb {
            background: #1a1a1a;
            padding: 10px 15px;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid #333;
        }

        .movie-header { padding: 15px; }
        .movie-title { font-size: 20px; color: #00acee; margin: 0 0 15px 0; }

        /* VIDEO PLAYER */
        .video-box {
            background: #000;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        .play-circle {
            width: 60px; height: 60px;
            background: #32CD32;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer;
        }

        /* INFO & CAST TABS */
        .tabs { display: flex; background: #111; border-bottom: 2px solid #333; }
        .tab { padding: 10px 25px; background: var(--btn-blue); font-size: 13px; font-weight: bold; }

        .synopsis-area { padding: 20px; }
        .synopsis-title { font-size: 18px; color: var(--text-gold); margin-bottom: 10px; }

        /* DOWNLOAD AREA (EXACT STYLE) */
        .download-box { text-align: center; padding: 20px 0; }
        .res-text { color: var(--res-label); font-weight: bold; display: block; margin: 15px 0 5px; font-size: 18px; }
        .download-link {
            background: var(--btn-blue);
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            font-weight: bold;
            display: block;
            width: 85%;
            margin: 0 auto 10px auto;
            border-radius: 4px;
            font-size: 15px;
            transition: 0.3s;
        }
        .download-link:hover { background: var(--btn-blue-hover); }

        /* SIDEBAR STYLE */
        .sidebar-heading {
            font-size: 15px;
            background: #111;
            padding: 8px 12px;
            border-left: 3px solid var(--btn-blue);
            margin-bottom: 10px;
        }
        .sidebar-item {
            display: flex;
            background: #1a1a1a;
            margin-bottom: 8px;
            padding: 5px;
            border: 1px solid #2a2a2a;
        }
        .sidebar-item img { width: 60px; height: 85px; object-fit: cover; }
        .sidebar-info { padding: 5px 10px; }
        .sidebar-info div { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .sidebar-info span { font-size: 11px; color: var(--text-muted); }

        .genre-tag {
            display: block;
            padding: 6px 10px;
            border-bottom: 1px solid #333;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>

<header class="header-nav">
    <div class="logo">VEGA<span>MOVIES</span></div>
    <div class="nav-links">
        <div>Movies</div>
        <div>Bollywood</div>
        <div>Hollywood</div>
        <div>TV Series</div>
    </div>
</header>

<div class="search-bar-container">
    <input type="text" id="movieUrl" placeholder="Paste Vegaduo link here...">
    <button id="fetchBtn" onclick="fetchMovie()">Fetch Details</button>
</div>

<div class="container" id="contentWrapper" style="display: none;">
    <div class="main-content">
        <div class="breadcrumb" id="genresText"></div>
        
        <div class="movie-header">
            <h1 class="movie-title" id="title"></h1>
            <div class="tabs"><div class="tab">Info</div><div class="tab" style="background: #333;">Cast</div></div>
        </div>

        <div class="video-box">
            <div class="play-circle">▶</div>
        </div>

        <div class="synopsis-area">
            <div class="synopsis-title">Synopsis</div>
            <p id="description" style="font-size: 14px; line-height: 1.5; color: #ddd;"></p>
            
            <div id="dlLinks" class="download-box">
                </div>

            <div style="margin-top: 30px; border-top: 1px solid #444; padding-top: 20px;">
                <p><strong>Original Title:</strong> <span id="origTitle"></span></p>
                <p><strong>Release:</strong> <span id="date"></span> | <strong>Duration:</strong> <span id="duration"></span></p>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-heading">Popular Content</div>
        <div id="popular"></div>

        <div class="sidebar-heading" style="margin-top:20px">Genres</div>
        <div id="genreList"></div>
    </div>
</div>

<script>
async function fetchMovie() {
    const link = document.getElementById('movieUrl').value;
    if(!link) return alert("Please enter a link!");
    
    const api = `https://vajira-official-apis.vercel.app/api/vegamoviedl?apikey=vajira-4h3jzwtl78-1775239300004&link=${encodeURIComponent(link)}`;

    try {
        const res = await fetch(api);
        const data = await res.json();
        const movie = data.result;

        // Display Wrapper
        document.getElementById('contentWrapper').style.display = 'grid';

        // Map Data
        document.getElementById('title').innerText = movie.title;
        document.getElementById('origTitle').innerText = movie.originalTitle;
        document.getElementById('date').innerText = movie.date;
        document.getElementById('duration').innerText = movie.duration;
        document.getElementById('description').innerText = movie.description;
        document.getElementById('genresText').innerText = movie.genresText.replace(/\//g, " » ");

        // Map Downloads
        const dlDiv = document.getElementById('dlLinks');
        dlDiv.innerHTML = `<h3 style="color:#00acee">${movie.downloadsTitle || 'Download Links'}</h3>`;
        movie.downloads.forEach((dl, i) => {
            const resLabel = i % 2 === 0 ? "720p" : "480p";
            dlDiv.innerHTML += `
                <span class="res-text">${resLabel}</span>
                <a href="${dl.url}" class="download-link" target="_blank">⚡ ${dl.buttonLabel}</a>
            `;
        });

        // Map Popular (Sidebar)
        const popDiv = document.getElementById('popular');
        popDiv.innerHTML = '';
        movie.popularTVSeries.forEach(item => {
            popDiv.innerHTML += `
                <div class="sidebar-item">
                    <img src="${item.image}">
                    <div class="sidebar-info">
                        <div>${item.title}</div>
                        <span>⭐ ${item.rating} (${item.releaseYear})</span>
                    </div>
                </div>
            `;
        });

        // Map Genres
        const genDiv = document.getElementById('genreList');
        genDiv.innerHTML = '';
        movie.genres.slice(0, 10).forEach(g => {
            genDiv.innerHTML += `<div class="genre-tag">○ ${g.genreName} (${g.totalItems})</div>`;
        });

    } catch (e) {
        alert("Error fetching data. Check your API key or link.");
    }
}
</script>

</body>
</html>
