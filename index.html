<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegamovies - Premium Movie Hub</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-blue: #007bff;
            --text-gold: #f39c12;
            --btn-green: #2ecc71;
        }

        body {
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0;
        }

        /* NAVBAR & SEARCH */
        .nav { background: #000; padding: 15px 5%; border-bottom: 2px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 26px; font-weight: 900; color: #fff; text-decoration: none; }
        .logo span { color: var(--text-gold); }

        .search-area { background: #222; padding: 20px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; }
        #movieUrl { width: 40%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 4px; }
        #btnFetch { padding: 12px 25px; background: var(--btn-green); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* CONTENT LAYOUT */
        .wrapper { max-width: 1250px; margin: 20px auto; display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 0 15px; }

        .content-main { background: var(--card-bg); border-radius: 4px; border: 1px solid #2a2a2a; overflow: hidden; }
        .breadcrumb { background: #111; padding: 10px 20px; font-size: 11px; color: #888; border-bottom: 1px solid #2a2a2a; }

        /* VIDEO PLAYER SECTION */
        .player-container {
            width: 100%;
            background: #000;
            position: relative;
            aspect-ratio: 16 / 9;
            border-bottom: 1px solid #333;
        }
        video { width: 100%; height: 100%; object-fit: contain; outline: none; }
        
        .player-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
            transition: 0.5s; z-index: 5;
        }
        .play-btn {
            width: 70px; height: 70px; background: var(--btn-green);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: white; cursor: pointer; box-shadow: 0 0 20px rgba(46,204,113,0.4);
        }

        /* MOVIE META */
        .movie-header { padding: 20px; }
        .movie-title { font-size: 24px; color: #00acee; margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .meta-grid { display: flex; gap: 25px; margin-bottom: 30px; }
        .poster-img { width: 210px; border: 3px solid #333; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .info-list p { margin: 8px 0; font-size: 14px; }
        .info-list b { color: #888; width: 120px; display: inline-block; }

        /* DOWNLOAD BUTTONS */
        .dl-section { background: #111; padding: 30px; text-align: center; border-top: 1px solid #333; }
        .dl-res-tag { color: #ff4d4d; font-weight: bold; font-size: 18px; display: block; margin: 25px 0 10px; }
        .dl-btn {
            display: block; width: 85%; margin: 0 auto 12px auto; background: var(--accent-blue);
            color: white; padding: 15px; text-decoration: none; font-weight: bold;
            border-radius: 5px; border-bottom: 4px solid #0056b3; transition: 0.2s;
        }
        .dl-btn:hover { background: #0069d9; transform: translateY(-2px); }

        /* SIDEBAR */
        .side-title { background: #000; padding: 12px; border-left: 4px solid var(--accent-blue); font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .side-card { display: flex; background: #1a1a1a; margin-bottom: 10px; border: 1px solid #222; text-decoration: none; color: inherit; }
        .side-card img { width: 70px; height: 95px; object-fit: cover; }
        .side-info { padding: 8px 12px; }
        .side-info .t { font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px; }
        .side-info .r { font-size: 11px; color: var(--text-gold); }

        .genre-box { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .genre-link { background: #111; padding: 8px; font-size: 11px; border: 1px solid #222; text-decoration: none; color: #bbb; text-align: center; }
    </style>
</head>
<body>

<div class="nav">
    <a href="#" class="logo">VEGA<span>MOVIES</span></a>
    <div style="font-size: 12px;">Login | 2026 Edition</div>
</div>

<div class="search-area">
    <input type="text" id="movieUrl" placeholder="Paste Vegaduo link here...">
    <button id="btnFetch" onclick="fetchFullDetails()">FETCH MOVIE & PLAYER</button>
</div>

<div class="wrapper" id="mainLayout" style="display: none;">
    <div class="content-main">
        <div class="breadcrumb" id="breadPath"></div>
        
        <div class="player-container">
            <div id="playerOverlay" class="player-overlay">
                <div class="play-btn" onclick="startPlayer()">▶</div>
            </div>
            <video id="movieVideo" controls poster="">
                <source id="videoSrc" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="movie-header">
            <h1 class="movie-title" id="title"></h1>
            <div class="meta-grid">
                <img id="poster" class="poster-img" src="">
                <div class="info-list">
                    <p><b>Original Title:</b> <span id="origTitle"></span></p>
                    <p><b>Release Date:</b> <span id="date"></span></p>
                    <p><b>Duration:</b> <span id="dur"></span></p>
                    <p><b>Country:</b> <span id="country"></span></p>
                    <p><b>Genres:</b> <span id="genres"></span></p>
                </div>
            </div>

            <div class="dl-section">
                <h3 id="dlMainTitle" style="margin-bottom:20px;"></h3>
                <div id="dlLinks"></div>
            </div>

            <div style="padding: 20px; border-top: 1px solid #333;">
                <h3 style="color:var(--text-gold)">Synopsis / Plot</h3>
                <p id="desc" style="color:#ccc; line-height:1.7; font-size:14px;"></p>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="side-title">POPULAR TV SERIES</div>
        <div id="popular"></div>

        <div class="side-title" style="margin-top:20px;">GENRE CLOUD</div>
        <div class="genre-box" id="genreArea"></div>
    </div>
</div>

<script>
async function fetchFullDetails() {
    const input = document.getElementById('movieUrl').value;
    if(!input) return alert("Please enter a valid link!");

    const api = `https://vajira-official-apis.vercel.app/api/vegamoviedl?apikey=vajira-4h3jzwtl78-1775239300004&link=${encodeURIComponent(input)}`;

    try {
        const response = await fetch(api);
        const data = await response.json();
        const m = data.result;

        document.getElementById('mainLayout').style.display = 'grid';

        // Set Player
        const video = document.getElementById('movieVideo');
        const overlay = document.getElementById('playerOverlay');
        video.poster = m.image;
        overlay.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${m.image}')`;
        overlay.style.display = 'flex';
        
        // Use first download link as preview if available
        if(m.downloads && m.downloads.length > 0) {
            document.getElementById('videoSrc').src = m.downloads[0].url;
            video.load();
        }

        // Basic Info
        document.getElementById('title').innerText = m.title;
        document.getElementById('poster').src = m.image;
        document.getElementById('origTitle').innerText = m.originalTitle;
        document.getElementById('date').innerText = m.date;
        document.getElementById('dur').innerText = m.duration;
        document.getElementById('country').innerText = m.country;
        document.getElementById('genres').innerText = m.genresText;
        document.getElementById('desc').innerText = m.description;
        document.getElementById('breadPath').innerText = m.genresText.replace(/\//g, " » ");
        document.getElementById('dlMainTitle').innerText = m.downloadsTitle;

        // Downloads
        const dlDiv = document.getElementById('dlLinks');
        dlDiv.innerHTML = '';
        m.downloads.forEach((dl, i) => {
            if(i % 3 === 0) {
                const quality = ["480p SD Quality", "720p HD Quality", "1080p Full HD"][Math.floor(i/3)] || "Direct Downloads";
                dlDiv.innerHTML += `<span class="dl-res-tag">${quality}</span>`;
            }
            dlDiv.innerHTML += `<a href="${dl.url}" target="_blank" class="dl-btn">⚡ ${dl.buttonLabel}</a>`;
        });

        // Sidebar Popular
        const popDiv = document.getElementById('popular');
        popDiv.innerHTML = '';
        m.popularTVSeries.forEach(tv => {
            popDiv.innerHTML += `
                <a href="${tv.url}" class="side-card">
                    <img src="${tv.image}">
                    <div class="side-info">
                        <span class="t">${tv.title}</span>
                        <span class="r">⭐ ${tv.rating} (${tv.releaseYear})</span>
                    </div>
                </a>`;
        });

        // Genres
        const genArea = document.getElementById('genreArea');
        genArea.innerHTML = '';
        m.genres.slice(0, 12).forEach(g => {
            genArea.innerHTML += `<a href="${g.url}" class="genre-link">${g.genreName} (${g.totalItems})</a>`;
        });

    } catch (e) {
        alert("API Error! Please check your link.");
    }
}

function startPlayer() {
    const video = document.getElementById('movieVideo');
    const overlay = document.getElementById('playerOverlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 500);
    video.play();
}
</script>

</body>
</html>
