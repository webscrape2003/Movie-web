<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlex | Cinema Database</title>
    <style>
        /* --- CSS STYLING --- */
        :root {
            --primary: #e50914;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .search-container {
            display: flex;
            gap: 8px;
            background: #333;
            padding: 5px 10px;
            border-radius: 4px;
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            outline: none;
            width: 200px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #b20710;
        }

        main {
            padding: 40px 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        /* Movie Card Design */
        .movie-card {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .poster-container {
            position: relative;
            height: 270px;
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quality-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary);
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 2px;
        }

        .info {
            padding: 12px;
        }

        .info h3 {
            font-size: 14px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-dim);
        }

        .rating {
            color: #ffb400;
            font-weight: bold;
        }

        /* Loading & Messages */
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">MOVIEFLEX</a>
        <div class="search-container">
            <input type="text" id="userInput" placeholder="Search year (e.g. 2024)..." onkeypress="handleKey(event)">
            <button onclick="fetchMovies()">Search</button>
        </div>
    </header>

    <main>
        <div id="movieGrid" class="grid">
            </div>
    </main>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        
        // Function to handle "Enter" key press
        function handleKey(e) {
            if (e.key === 'Enter') fetchMovies();
        }

        async function fetchMovies() {
            const grid = document.getElementById('movieGrid');
            const query = document.getElementById('userInput').value || '2026';
            const apiKey = 'vajira-4h3jzwtl78-1775239300004';
            const apiUrl = `https://vajira-official-apis.vercel.app/api/vegamovies?apikey=${apiKey}&text=${query}`;

            grid.innerHTML = '<div class="status-msg">Searching for "' + query + '" movies...</div>';

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status === 200 && data.result.length > 0) {
                    renderMovies(data.result);
                } else {
                    grid.innerHTML = '<div class="status-msg">No movies found. Try another year or title.</div>';
                }
            } catch (error) {
                grid.innerHTML = '<div class="status-msg">Error connecting to server. Check your connection.</div>';
                console.error("API Error:", error);
            }
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = ''; // Clear status message

            movies.forEach(movie => {
                // Formatting the year to remove the timestamp if it exists
                const simpleYear = movie.year.split(',')[0];
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="poster-container">
                        <span class="quality-tag">${movie.quality !== "N/A" ? movie.quality : 'HD'}</span>
                        <img src="${movie.image}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                    </div>
                    <div class="info">
                        <h3 title="${movie.title}">${movie.title}</h3>
                        <div class="meta">
                            <span class="rating">★ ${movie.rating}</span>
                            <span>${simpleYear}</span>
                        </div>
                    </div>
                `;
                
                // Link to the movie details page
                card.onclick = () => {
                    window.open(`https://vegaduo.com/${movie.link}`, '_blank');
                };

                grid.appendChild(card);
            });
        }

        // Initial load for 2026 movies
        window.onload = fetchMovies;
    </script>
</body>
</html>
