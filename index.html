<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VegaMovies - Smart Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #27ae60;
            --text-main: #ffffff;
            --text-dim: #999;
            --nav-bg: #000000;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
        }

        /* Top Nav */
        .top-nav {
            background-color: var(--nav-bg);
            padding: 12px 5%;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo { font-size: 22px; font-weight: bold; }
        .logo span { color: var(--accent-color); }

        /* Search Section */
        .search-container {
            background: #111;
            padding: 20px 5%;
            border-top: 1px solid #333;
        }

        .search-banner {
            background: #1a1a1a;
            border-left: 4px solid var(--accent-color);
            padding: 8px 15px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #ccc;
        }

        .search-title { font-size: 16px; margin-bottom: 10px; font-weight: bold; }

        .search-input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        #movie-search {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 15px;
            border-radius: 4px;
            outline: none;
        }

        .search-icon { position: absolute; right: 15px; color: #fff; }

        /* Grid */
        .main-layout { padding: 20px 5%; }
        .section-header { border-left: 4px solid var(--accent-color); padding-left: 10px; margin-bottom: 20px; }

        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .featured-label { position: absolute; top: 8px; left: 8px; background: var(--accent-color); font-size: 10px; padding: 2px 6px; font-weight: bold; border-radius: 2px; }
        .movie-info { padding: 8px; }
        .movie-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }

        #status-msg { text-align: center; padding: 20px; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">VEGA<span>MOVIES</span></div>
    </nav>

    <div class="search-container">
        <div class="search-banner">VegaMovies – HD Quality Movies & Series</div>
        <div class="search-title">Watch & Download Bollywood, Hollywood & South Indian Movies</div>
        <div class="search-input-group">
            <input type="text" id="movie-search" placeholder="Type movie name (e.g. Avatar, Batman)...">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
        </div>
    </div>

    <div class="main-layout">
        <div class="section-header" id="list-title">Latest Movies</div>
        <div id="status-msg"></div>
        <div id="movie-grid"></div>
    </div>

    <script>
        const apiKey = "vajira-4h3jzwtl78-1775239300004";
        const searchInput = document.getElementById('movie-search');
        const grid = document.getElementById('movie-grid');
        const statusMsg = document.getElementById('status-msg');
        const listTitle = document.getElementById('list-title');

        let timeout = null;

        // Function to call API
        async function fetchMovies(query = "2026") {
            statusMsg.innerText = "Searching...";
            grid.innerHTML = "";
            
            try {
                // We swap "2026" for the user's "query"
                const url = `https://vajira-official-apis.vercel.app/api/vegamovies?apikey=${apiKey}&text=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.result && data.result.length > 0) {
                    statusMsg.innerText = "";
                    renderMovies(data.result);
                } else {
                    statusMsg.innerText = "No movies found for this search.";
                }
            } catch (error) {
                statusMsg.innerText = "Error loading movies.";
                console.error(error);
            }
        }

        function renderMovies(movies) {
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => window.open(`https://vegaduo.com/${m.link}`, '_blank');
                
                card.innerHTML = `
                    <div class="featured-label">${m.quality !== "N/A" ? m.quality : 'FEATURED'}</div>
                    <img src="${m.image}" alt="${m.title}" onerror="this.src='https://via.placeholder.com/160x240?text=No+Poster'">
                    <div class="movie-info">
                        <div class="movie-title">${m.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Listen for typing
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value;
            
            // Clear previous timer
            clearTimeout(timeout);

            // Wait 500ms after user stops typing to fetch
            timeout = setTimeout(() => {
                if (val.trim().length > 0) {
                    listTitle.innerText = `Search Results: ${val}`;
                    fetchMovies(val); // Search the name
                } else {
                    listTitle.innerText = "Latest Movies";
                    fetchMovies("2026"); // Default back to home
                }
            }, 500);
        });

        // Load default on start
        fetchMovies();
    </script>
</body>
</html>
