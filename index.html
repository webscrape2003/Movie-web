<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieHub - Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-900 text-white min-h-screen">

  <!-- HEADER -->
  <header class="text-center py-8">
    <h1 class="text-4xl md:text-5xl font-bold">🎬 MovieHub</h1>
    <p class="text-gray-400 mt-2">Search your favorite movies instantly</p>
  </header>

  <!-- SEARCH BAR -->
  <div class="max-w-3xl mx-auto px-4">
    <div class="flex shadow-2xl rounded-2xl overflow-hidden">
      <input id="searchInput" type="text" placeholder="Search movies like Avengers..."
        class="w-full p-4 bg-gray-800 focus:outline-none">
      <button onclick="searchMovies()"
        class="bg-blue-600 px-6 hover:bg-blue-700 transition">Search</button>
    </div>
  </div>

  <!-- LOADER -->
  <div id="loader" class="text-center mt-6 hidden">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mx-auto"></div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="max-w-7xl mx-auto mt-10 px-4 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>

  <!-- FOOTER -->
  <footer class="text-center text-gray-500 text-sm py-6 mt-10">
    © 2026 MovieHub | Powered by Vajira API
  </footer>

  <script>
    async function searchMovies() {
      const query = document.getElementById('searchInput').value.trim();
      const resultsDiv = document.getElementById('results');
      const loader = document.getElementById('loader');

      if (!query) return;

      resultsDiv.innerHTML = '';
      loader.classList.remove('hidden');

      try {
        const res = await fetch(`https://vajira-official-apis.vercel.app/api/vegamovies?apikey=vajira-1rtwuqyc48-1774786581090&text=${query}`);
        const data = await res.json();

        loader.classList.add('hidden');

        if (!data.result || data.result.length === 0) {
          resultsDiv.innerHTML = '<p class="text-center col-span-full">No movies found 😢</p>';
          return;
        }

        resultsDiv.innerHTML = data.result.map(movie => `
          <div onclick="goToDetails('${movie.title}','${movie.image}','${movie.year}','${movie.rating}','${movie.quality}','${movie.link}')"
            class="cursor-pointer bg-gray-800 rounded-2xl overflow-hidden shadow-xl hover:scale-105 hover:shadow-2xl transition duration-300">
            <div class="relative">
              <img src="${movie.image}" class="w-full h-64 object-cover">
              <span class="absolute top-2 right-2 bg-blue-600 text-xs px-2 py-1 rounded">${movie.quality}</span>
            </div>

            <div class="p-3">
              <h2 class="font-semibold text-sm truncate">${movie.title}</h2>
              <p class="text-xs text-gray-400">${movie.year} • ⭐ ${movie.rating}</p>
            </div>
          </div>
        `).join('');

      } catch (err) {
        loader.classList.add('hidden');
        resultsDiv.innerHTML = '<p class="text-center col-span-full">Error loading movies ❌</p>';
        console.error(err);
      }
    }

    // REDIRECT TO DETAILS PAGE
    function goToDetails(title, image, year, rating, quality, link) {
      const url = `mvdetails.html?title=${encodeURIComponent(title)}&image=${encodeURIComponent(image)}&year=${year}&rating=${rating}&quality=${quality}&link=${encodeURIComponent(link)}`;
      window.location.href = url;
    }

    // ENTER KEY SEARCH
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') searchMovies();
    });
  </script>

</body>
</html>
