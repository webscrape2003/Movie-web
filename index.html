<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - Vega Style</title>
    <style>
        /* CSS STYLES */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --accent-color: #4CAF50; /* Green badges */
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-container {
            max-width: 600px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: white;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            background-color: var(--accent-color);
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Movie Grid */
        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            position: relative;
            border-bottom: 3px solid transparent;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-bottom: 3px solid var(--accent-color);
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .quality-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent-color);
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 3px;
            font-weight: bold;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-year {
            font-size: 12px;
            color: var(--text-dim);
        }

        .loading { text-align: center; font-size: 20px; }
    </style>
</head>
<body>

<header>
    <h1>VEGAMOVIES CLONE</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search movies (e.g. 2026)...">
        <button onclick="searchMovies()">Search</button>
    </div>
</header>

<div id="movie-grid">
    </div>

<script>
    const apiKey = "vajira-4h3jzwtl78-1775239300004";
    const grid = document.getElementById('movie-grid');

    async function searchMovies() {
        const query = document.getElementById('searchInput').value;
        if (!query) return;

        grid.innerHTML = '<div class="loading">Searching...</div>';

        try {
            const response = await fetch(`https://vajira-official-apis.vercel.app/api/vegamovies?apikey=${apiKey}&text=${query}`);
            const data = await response.json();

            if (data.status === 200 && data.result) {
                displayMovies(data.result);
            } else {
                grid.innerHTML = '<p>No movies found.</p>';
            }
        } catch (error) {
            console.error("Error fetching data:", error);
            grid.innerHTML = '<p>Error loading movies. Please try again later.</p>';
        }
    }

    function displayMovies(movies) {
        grid.innerHTML = ''; // Clear previous results

        movies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';

            card.innerHTML = `
                <span class="quality-badge">${movie.quality}</span>
                <img class="movie-poster" src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Poster'">
                <div class="movie-info">
                    <h3 class="movie-title">${movie.title}</h3>
                    <div class="movie-year">${movie.year}</div>
                </div>
                <a href="${movie.link}" target="_blank" style="position:absolute; top:0; left:0; width:100%; height:100%;"></a>
            `;
            grid.innerHTML += card.outerHTML;
        });
    }

    // Load 2026 movies by default on page load
    window.onload = () => {
        document.getElementById('searchInput').value = '2026';
        searchMovies();
    };
</script>

</body>
</html>
