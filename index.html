<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEGAMOVIES | Vajira Official</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #161616;
            --accent: #4CAF50;
            --text-main: #ffffff;
            --text-dim: #999;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: #000;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .logo { font-size: 28px; font-weight: 800; letter-spacing: 2px; margin-bottom: 20px; }
        .logo span { color: var(--accent); }

        .search-box {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            background: #222;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        .search-box button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 25px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
        }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 25px;
            border-left: 5px solid var(--accent);
            padding-left: 15px;
            text-transform: uppercase;
        }

        #movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s ease;
            text-decoration: none;
            color: white;
            display: block;
            position: relative;
        }

        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.6); }

        .poster-wrapper { position: relative; width: 100%; aspect-ratio: 2/3; background: #222; }
        .movie-poster { width: 100%; height: 100%; object-fit: cover; }

        .badge-quality {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            font-weight: bold;
            border-radius: 3px;
        }

        .movie-info { padding: 15px; }
        .movie-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta { font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<header>
    <div class="logo">VEGA<span>MOVIES</span></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Movie or Year...">
        <button onclick="handleSearch()">SEARCH</button>
    </div>
</header>

<div class="container">
    <div class="section-title" id="displayLabel">Latest Movies (2026)</div>
    <div id="movie-grid"></div>
</div>

<script>
    const API_KEY = "vajira-4h3jzwtl78-1775239300004";
    const API_URL = "https://vajira-official-apis.vercel.app/api/vegamovies";

    // Main fetch function
    async function fetchMovies(query, isHome = false) {
        const grid = document.getElementById('movie-grid');
        const label = document.getElementById('displayLabel');

        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">Loading Movies...</div>';
        
        if (!isHome) {
            label.innerText = `Search Results for: ${query}`;
        }

        try {
            const response = await fetch(`${API_URL}?apikey=${API_KEY}&text=${query}`);
            const data = await response.json();

            if (data.result && data.result.length > 0) {
                grid.innerHTML = "";
                data.result.forEach(movie => {
                    const card = `
                        <a href="${movie.link}" target="_blank" class="movie-card">
                            <div class="poster-wrapper">
                                <span class="badge-quality">${movie.quality}</span>
                                <img src="${movie.poster}" alt="${movie.title}" class="movie-poster" onerror="this.src='https://via.placeholder.com/200x300?text=No+Poster'">
                            </div>
                            <div class="movie-info">
                                <div class="movie-title">${movie.title}</div>
                                <div class="movie-meta">
                                    <span>Year: ${movie.year}</span>
                                    <span style="color:var(--accent)">Download</span>
                                </div>
                            </div>
                        </a>
                    `;
                    grid.innerHTML += card;
                });
            } else {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;">No movies found.</div>';
            }
        } catch (error) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: red;">Connection Error.</div>';
        }
    }

    // Function for button click
    function handleSearch() {
        const query = document.getElementById('searchInput').value;
        if (query.trim() !== "") {
            fetchMovies(query);
        }
    }

    // HOME PAGE: Always load 2026 by default
    window.onload = () => {
        fetchMovies('2026', true);
    };

    // Support for Enter key
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSearch();
    });
</script>

</body>
</html>
